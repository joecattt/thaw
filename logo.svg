<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0f3350"/>
      <stop offset="100%" stop-color="#081e2e"/>
    </radialGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8e6f8"/>
      <stop offset="40%" stop-color="#8cc8de"/>
      <stop offset="100%" stop-color="#5da5c2"/>
    </linearGradient>
    <linearGradient id="melt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8cc8de"/>
      <stop offset="50%" stop-color="#5da5c2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a8aaa" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="frost" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.08" intercept="0.06"/>
        <feFuncG type="linear" slope="0.1" intercept="0.12"/>
        <feFuncB type="linear" slope="0.12" intercept="0.18"/>
        <feFuncA type="linear" slope="0.15" intercept="0"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" rx="48"/>
  <rect width="800" height="800" filter="url(#frost)" rx="48" opacity="0.5"/>
  <circle cx="400" cy="310" r="180" fill="rgba(140,200,220,0.04)" filter="url(#softglow)"/>
