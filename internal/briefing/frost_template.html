<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>thaw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anybody:wdth,wght@75..150,400;75..150,700;75..150,900&family=Fira+Code:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

:root {
  --base: #0a2435;
  /* Multi-hue ice palette */
  --ice-white: #ffffff;
  --ice-pale: #f0f8fc;       /* near-white cyan — primary prose text */
  --ice-mid: #98c4d6;         /* mid blue — secondary text, brighter */
  --ice-deep: #5a9ab2;        /* teal — labels, READABLE not dim */
  --ice-blue-green: #2a6878;  /* blue-green — structural lines */
  --ice-glow: rgba(180,230,255,0.18);
  --warm-refract: rgba(255,210,160,0.06); /* warm light refracting through ice */
  --emerald: #34d399;
  --amber: #f59e0b;
  --red-alert: #f87171;
  --display: 'Anybody', sans-serif;
  --mono: 'Fira Code', monospace;
  --prose: 'DM Sans', sans-serif;  /* proportional for narrative */
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--base)}

body{cursor:none}
#cursor-glow{position:fixed;top:0;left:0;width:100px;height:100px;border-radius:50%;pointer-events:none;z-index:999;
  background:radial-gradient(circle,rgba(140,210,240,0.04) 0%,transparent 70%);margin-left:-50px;margin-top:-50px;will-change:transform}
#cursor-dot{position:fixed;top:0;left:0;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:1000;
  background:rgba(200,235,255,0.5);box-shadow:0 0 8px rgba(160,220,240,0.3);margin-left:-2.5px;margin-top:-2.5px;will-change:transform}

/* Layers */
#world{position:fixed;inset:0;z-index:0}
#ice-wall{position:fixed;inset:0;z-index:2;
  background:linear-gradient(160deg,rgba(35,100,130,0.6) 0%,rgba(30,88,118,0.55) 25%,rgba(25,80,108,0.5) 50%,rgba(32,92,122,0.55) 75%,rgba(38,100,132,0.6) 100%);
  backdrop-filter:blur(90px) saturate(1.3) brightness(1.02);-webkit-backdrop-filter:blur(90px) saturate(1.3) brightness(1.02);opacity:0}

/* Warm accent — VISIBLE */
#warm-glow{position:fixed;bottom:0;left:0;right:0;height:45%;z-index:3;pointer-events:none;opacity:0;
  background:linear-gradient(0deg,rgba(255,150,60,0.1) 0%,rgba(255,180,100,0.04) 40%,transparent 100%)}
#warm-edge{position:fixed;top:15%;right:0;bottom:0;width:35%;z-index:3;pointer-events:none;opacity:0;
  background:linear-gradient(270deg,rgba(255,200,120,0.045) 0%,transparent 100%)}

#frost-patches{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0}
#ice-tex-coarse{position:fixed;inset:-60px 0;z-index:4;pointer-events:none;opacity:0;will-change:transform}
#ice-tex-fine{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;will-change:transform}
#edge-frost{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0}
#res-cracks{position:fixed;inset:0;z-index:7;pointer-events:none;opacity:0}
#snow-fg{position:fixed;inset:0;z-index:8;pointer-events:none}
#content{position:fixed;inset:0;z-index:10;display:flex;align-items:flex-start;justify-content:center;pointer-events:none;overflow-y:auto;padding:clamp(20px,4vh,60px) 0;scrollbar-width:thin;scrollbar-color:rgba(140,200,230,0.08) transparent}
.terminal{width:min(900px,94vw);pointer-events:all;opacity:0;position:relative;padding-bottom:20px}

#frost-overlay{position:fixed;inset:0;z-index:50;pointer-events:none}
#start-gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:radial-gradient(ellipse at center,rgba(10,36,53,0.85) 0%,rgba(10,36,53,0.98) 100%)}
#start-gate .gate-label{font-family:var(--display);font-weight:900;font-stretch:125%;font-size:14px;letter-spacing:6px;
  text-transform:uppercase;color:var(--ice-mid);opacity:0.6;animation:gatePulse 2.5s ease-in-out infinite}
@keyframes gatePulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
#crack-canvas{position:fixed;inset:0;z-index:55;pointer-events:none}
#melt-canvas{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0}

.icicles-top{position:absolute;top:-6px;left:-14px;right:-14px;height:100px;z-index:20;pointer-events:none}
.icicles-bot{position:absolute;bottom:-6px;left:-14px;right:-14px;height:70px;z-index:20;pointer-events:none;transform:scaleY(-1)}

/* Frame — seamless with ice */
.frame{background:rgba(18,60,85,0.1);border:none;border-radius:6px;overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,0.3),inset 0 1px 0 rgba(220,245,255,0.03);position:relative}
.frame::after{content:'';position:absolute;inset:0;border-radius:6px;
  border:1px solid rgba(160,220,245,0.035);
  border-right:1px solid rgba(160,220,245,0.06);
  pointer-events:none;z-index:2}
.frame::before{content:'';position:absolute;inset:-1px;border-radius:7px;
  background:linear-gradient(135deg,rgba(140,220,250,0.06),transparent 30%,transparent 70%,rgba(255,200,140,0.03));
  animation:edgePulse 6s ease-in-out infinite;pointer-events:none}
@keyframes edgePulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

.frame-frost{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:6px;opacity:0.7}
.scanlines{position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:6px;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.012) 2px,rgba(0,0,0,0.012) 4px)}
.thick-b{position:absolute;bottom:-8px;left:4px;right:4px;height:8px;
  background:linear-gradient(180deg,rgba(30,80,110,0.2),rgba(15,50,70,0.05));
  border-radius:0 0 5px 5px;transform:perspective(300px) rotateX(-12deg);transform-origin:top;z-index:-1}
.thick-r{position:absolute;top:4px;bottom:4px;right:-5px;width:5px;
  background:linear-gradient(90deg,rgba(30,80,110,0.15),rgba(15,50,70,0.03));
  border-radius:0 5px 5px 0;transform:perspective(300px) rotateY(12deg);transform-origin:left;z-index:-1}

.term-inner{position:relative;z-index:5;padding:clamp(18px,3vh,34px) clamp(22px,3vw,38px)}

/* Header */
.term-header{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:clamp(10px,1.5vh,16px);margin-bottom:clamp(14px,2vh,22px);
  border-bottom:1px solid rgba(140,200,230,0.04)}
.term-title{font-family:var(--display);font-weight:900;font-stretch:125%;
  font-size:clamp(14px,2vw,18px);letter-spacing:4px;text-transform:uppercase;
  color:var(--ice-white);text-shadow:0 0 16px var(--ice-glow),0 -1px 2px rgba(0,20,40,0.3)}
.term-date{font-family:var(--prose);font-size:clamp(12px,1.4vw,14px);color:var(--ice-pale)}

/* Stats — no borders between cells */
.stats{display:flex;gap:0;margin-bottom:clamp(14px,2vh,22px);border-radius:4px;overflow:hidden}
.stat{flex:1;padding:clamp(12px,1.5vh,18px) clamp(12px,1.5vw,20px);transition:background 0.3s}
.stat:hover{background:rgba(140,200,230,0.04)}
.stat-lbl{font-family:var(--prose);font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--ice-pale);opacity:0.7;margin-bottom:5px;
  text-shadow:0 1px 3px rgba(0,20,40,0.4)}
.stat-val{font-family:var(--display);font-weight:900;font-stretch:120%;
  color:var(--ice-white);line-height:1;text-shadow:0 0 12px var(--ice-glow),0 -1px 2px rgba(0,20,40,0.25)}
.stat:nth-child(1) .stat-val{font-size:clamp(26px,4vw,40px)}
.stat:nth-child(2) .stat-val{font-size:clamp(22px,3vw,32px)}
.stat:nth-child(3) .stat-val{font-size:clamp(20px,2.5vw,28px);color:var(--emerald);text-shadow:0 0 12px rgba(52,211,153,0.15)}
.stat:nth-child(4) .stat-val{font-size:clamp(18px,2vw,24px);color:var(--amber);text-shadow:0 0 12px rgba(245,158,11,0.1)}
/* Dep detail under stale */
.stat-detail{font-family:var(--prose);font-size:10px;color:var(--amber);opacity:0.7;margin-top:4px}

/* Time bar */
.time-row{display:flex;gap:2px;height:5px;border-radius:5px;overflow:hidden;margin-bottom:8px;background:rgba(140,200,230,0.03)}
.time-legend{display:flex;gap:20px;margin-bottom:clamp(12px,1.5vh,18px)}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--prose);font-size:12px;font-weight:500;color:var(--ice-pale)}
.legend-dot{width:7px;height:7px;border-radius:2px}
.legend-dim{color:var(--ice-mid);margin-left:3px}

/* Fracture separator */
.fracture{height:20px;position:relative;margin:clamp(8px,1vh,14px) 0}
.fracture canvas{position:absolute;inset:0;width:100%;height:100%}

/* ═══ PROJECT BLOCKS ═══ */
.proj{position:relative;margin-bottom:6px;border-radius:4px;overflow:hidden;opacity:0;transform:translateY(12px)}
.proj-body{position:relative;z-index:1;padding:clamp(14px,2vh,22px) clamp(16px,2vw,26px);
  background:transparent;border:none;border-radius:4px;transition:background 0.3s}
.proj-body:hover{background:rgba(140,200,230,0.03)}

/* Accent bar — 7px, with glow */
.proj-body::before{content:'';position:absolute;top:0;left:0;width:7px;height:100%;border-radius:4px 0 0 4px}

/* RUNNING — pulsing, brighter */
.proj.up .proj-body::before{background:var(--emerald);
  box-shadow:0 0 14px rgba(52,211,153,0.2),8px 0 30px rgba(52,211,153,0.04);
  animation:accentPulse 3s ease-in-out infinite}
@keyframes accentPulse{0%,100%{box-shadow:0 0 14px rgba(52,211,153,0.2),8px 0 30px rgba(52,211,153,0.04)}
  50%{box-shadow:0 0 22px rgba(52,211,153,0.3),12px 0 40px rgba(52,211,153,0.06)}}
.proj.up .proj-body{background:rgba(52,211,153,0.012)}

/* BLOCKED — red-amber accent, more urgent */
.proj.blocked .proj-body::before{background:var(--red-alert);
  box-shadow:0 0 12px rgba(248,113,113,0.15),8px 0 25px rgba(248,113,113,0.03)}
.proj.blocked .proj-body{background:rgba(248,113,113,0.008)}

/* PAUSED — dim, frosted over */
.proj.dn .proj-body::before{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,0.06);opacity:0.5}
.proj.dn .proj-body{background:rgba(140,200,230,0.008)}
.proj.dn .proj-name{color:var(--ice-mid) !important}
.proj.dn .lo-txt{opacity:0.65 !important}
.proj.dn::after{content:'';position:absolute;inset:0;border-radius:4px;background:rgba(20,60,90,0.06);pointer-events:none;z-index:2}

/* Priority badge */
.priority{font-family:var(--prose);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:3px 10px;border-radius:3px;display:inline-flex;align-items:center;gap:5px}
.priority.high{color:var(--red-alert);background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.12)}
.priority.low{color:var(--emerald);background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.1)}
.priority-dot{width:5px;height:5px;border-radius:50%}
.priority.high .priority-dot{background:var(--red-alert);box-shadow:0 0 6px rgba(248,113,113,0.3)}
.priority.low .priority-dot{background:var(--emerald)}

.proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:clamp(6px,1vh,10px)}
.proj-name{font-family:var(--display);font-weight:900;font-stretch:115%;
  font-size:clamp(16px,2.2vw,21px);color:var(--ice-white);
  text-shadow:0 0 14px var(--ice-glow),0 -1px 2px rgba(0,20,40,0.2)}
.proj-time{font-family:var(--display);font-weight:700;
  font-size:clamp(16px,2.2vw,21px);color:var(--ice-mid);text-shadow:0 0 10px rgba(180,230,255,0.06)}
/* Per-project timestamp */
.proj-last{font-family:var(--prose);font-size:12px;color:var(--ice-pale);opacity:0.7;margin-top:3px;
  text-shadow:0 1px 2px rgba(0,20,40,0.3)}

.proj-meta{display:flex;gap:8px;align-items:center;margin-bottom:clamp(10px,1.2vh,16px);flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:11px;font-weight:500;padding:5px 14px;border-radius:3px;letter-spacing:0.5px}
.tag-g{color:var(--emerald);border:1px solid rgba(52,211,153,0.15);background:rgba(52,211,153,0.05)}
.tag-a{color:var(--amber);border:1px solid rgba(245,158,11,0.12);background:rgba(245,158,11,0.04)}
.tag-r{color:var(--red-alert);border:1px solid rgba(248,113,113,0.12);background:rgba(248,113,113,0.04)}
.tag-d{color:var(--ice-mid);border:1px solid rgba(140,185,205,0.1)}

/* Section label — readable */
.lo-lbl{font-family:var(--prose);font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ice-mid);margin-bottom:10px;
  text-shadow:0 1px 3px rgba(0,20,40,0.35)}

/* Prose text — proportional, not monospace */
.lo-txt{font-family:var(--prose);font-size:clamp(14px,1.6vw,16px);line-height:1.8;font-weight:400;
  color:var(--ice-pale);text-shadow:0 -1px 1px rgba(0,20,40,0.1)}
.lo-txt strong{color:var(--ice-white);font-weight:700;
  text-shadow:0 0 8px var(--ice-glow),0 -1px 1px rgba(0,20,40,0.12)}

/* Process status */
.proc-row{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.proc{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px}
.proc-dot{width:6px;height:6px;border-radius:50%}
.proc-dot.on{background:var(--emerald);box-shadow:0 0 6px rgba(52,211,153,0.35)}
.proc-dot.off{background:var(--ice-deep);opacity:0.4}
.proc-name.on{color:var(--ice-pale)}
.proc-name.off{color:var(--ice-deep);opacity:0.5}

/* Resume commands — what to type first */
.resume-lbl{font-family:var(--prose);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--ice-mid);margin-top:14px;margin-bottom:6px;
  text-shadow:0 1px 3px rgba(0,20,40,0.35)}
.cmd{font-family:var(--mono);font-size:12px;padding:6px 12px;display:flex;gap:6px;
  background:rgba(0,15,25,0.18);border-radius:3px;margin-bottom:2px}
.cmd .d{color:rgba(52,211,153,0.4);user-select:none}
.cmd .c{color:var(--ice-pale);opacity:0.65}

/* Actions */
.actions{display:flex;gap:2px;margin-top:clamp(12px,1.5vh,20px);opacity:0}
.act{font-family:var(--display);font-weight:700;font-stretch:110%;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  padding:clamp(12px,1.5vh,17px) clamp(18px,2.5vw,30px);
  background:transparent;color:var(--ice-mid);border:none;
  cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.act:first-child{border-radius:4px 0 0 4px}
.act:last-child{border-radius:0 4px 4px 0}
.act:hover{background:rgba(140,200,230,0.05);color:var(--ice-white)}
.act.primary{color:var(--emerald)}
.act.primary:hover{background:rgba(52,211,153,0.04)}
.act::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;background:currentColor;opacity:0;transition:all 0.3s}
.act:hover::after{opacity:0.2;left:10%;right:10%}
/* Settings panel */
.settings-panel{position:absolute;bottom:52px;right:0;width:240px;background:rgba(8,18,28,0.92);border:1px solid rgba(140,200,230,0.08);border-radius:6px;padding:0;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity 0.25s,transform 0.25s;backdrop-filter:blur(12px);z-index:50;overflow:hidden}
.settings-panel.open{opacity:1;transform:translateY(0);pointer-events:auto}
.settings-header{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ice-blue);padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(140,200,230,0.06)}
.settings-close{cursor:pointer;opacity:0.4;font-size:13px;transition:opacity 0.2s}
.settings-close:hover{opacity:0.8}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;transition:background 0.15s}
.setting-row:hover{background:rgba(140,200,230,0.03)}
.setting-label{font-size:12px;color:rgba(200,220,240,0.7);font-family:var(--body)}
.setting-toggle{position:absolute;opacity:0;width:0;height:0}
.toggle-track{width:32px;height:18px;background:rgba(140,200,230,0.1);border-radius:9px;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(200,220,240,0.4);top:2px;left:2px;transition:transform 0.2s,background 0.2s}
.setting-toggle:checked+.toggle-track{background:rgba(52,211,153,0.2)}
.setting-toggle:checked+.toggle-track::after{transform:translateX(14px);background:var(--emerald)}
.settings-shortcuts{padding:0 14px 10px}
.shortcut{font-size:11px;color:rgba(200,220,240,0.4);padding:3px 0;font-family:var(--body)}
kbd{display:inline-block;background:rgba(140,200,230,0.06);border:1px solid rgba(140,200,230,0.1);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--mono);color:rgba(200,220,240,0.6);margin-right:6px;min-width:16px;text-align:center}
/* Click-to-copy feedback */
.c{cursor:pointer;position:relative;transition:color 0.15s}
.c:hover{color:var(--emerald)}
.c.copied::after{content:'copied';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--emerald);opacity:1;animation:copyFade 1.2s forwards;pointer-events:none;font-family:var(--display);letter-spacing:0.05em;text-transform:uppercase}
@keyframes copyFade{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.wv{display:inline-flex;gap:2px;align-items:center;height:12px;margin-right:5px;vertical-align:middle}
.wb{width:2px;height:4px;border-radius:1px;background:currentColor;opacity:.3;transition:all .2s}
</style>

<svg width="0" height="0" style="position:absolute">
<defs>
  <filter id="frost-dense" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="7" seed="2" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feComponentTransfer in="g"><feFuncR type="linear" slope="0.5" intercept="0.5"/>
    <feFuncG type="linear" slope="0.4" intercept="0.68"/><feFuncB type="linear" slope="0.35" intercept="0.78"/>
    <feFuncA type="linear" slope="0.92" intercept="0.08"/></feComponentTransfer>
  </filter>
  <filter id="ice-coarse" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="4" seed="9" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feComponentTransfer in="g"><feFuncR type="linear" slope="0.3" intercept="0.5"/>
    <feFuncG type="linear" slope="0.25" intercept="0.65"/><feFuncB type="linear" slope="0.2" intercept="0.78"/>
    <feFuncA type="linear" slope="0.4" intercept="0"/></feComponentTransfer>
  </filter>
  <filter id="ice-fine" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="5" seed="14" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feComponentTransfer in="g"><feFuncR type="linear" slope="0.18" intercept="0.55"/>
    <feFuncG type="linear" slope="0.15" intercept="0.68"/><feFuncB type="linear" slope="0.12" intercept="0.8"/>
    <feFuncA type="linear" slope="0.25" intercept="0"/></feComponentTransfer>
  </filter>
</defs>
</svg>
</head>
<body>

<div id="cursor-glow"></div><div id="cursor-dot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const VW=innerWidth,VH=innerHeight;
const cg=document.getElementById('cursor-glow'),cdd=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{const t='translate3d('+e.clientX+'px,'+e.clientY+'px,0)';cg.style.transform=t;cdd.style.transform=t});

/* Three.js */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(VW,VH);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x0a2435);renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
document.getElementById('world').appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x0a2435,0.005);
const camera=new THREE.PerspectiveCamera(55,VW/VH,0.1,500);camera.position.set(0,0,38);
scene.add(new THREE.AmbientLight(0x1a5570,0.6));
const moon=new THREE.DirectionalLight(0x88ccee,1.4);moon.position.set(12,20,15);scene.add(moon);
const rimB=new THREE.PointLight(0x3399cc,0.8,60);rimB.position.set(-12,4,12);scene.add(rimB);
const warmL=new THREE.PointLight(0xffaa55,0.3,40);warmL.position.set(8,-10,8);scene.add(warmL);

const iceGeo=new THREE.IcosahedronGeometry(4.5,2);
const iceMat=new THREE.ShaderMaterial({transparent:true,uniforms:{uTime:{value:0},uOp:{value:0}},
  vertexShader:`varying vec3 vN,vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform float uTime,uOp;varying vec3 vN,vP;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){vec3 V=normalize(-vP);float fr=pow(1.-max(dot(V,vN),0.),3.);
    float ca=n(vN.xy*4.+uTime*.12)*.45+n(vN.yz*6.-uTime*.08)*.3;
    vec3 col=vec3(.3,.6,.75)+vec3(.1,.18,.22)*ca+vec3(.2,.35,.45)*fr*.4;
    gl_FragColor=vec4(col,(0.06+fr*.3+ca*.04)*uOp);}`});
const iceMesh=new THREE.Mesh(iceGeo,iceMat);iceMesh.scale.set(.01,.01,.01);iceMesh.position.set(-6,3,0);scene.add(iceMesh);

const sGeo=new THREE.OctahedronGeometry(.4,0);const shards=[];
for(let i=0;i<25;i++){const m=new THREE.Mesh(sGeo,new THREE.MeshPhysicalMaterial({color:[0x99ddff,0xffcc88,0x99aaff,0x88ffcc][i%4],metalness:.1,roughness:.05,transparent:true,opacity:0}));
const sc=.15+Math.random()*.6;m.scale.set(sc,sc*(1+Math.random()),sc);shards.push({m,r:7+Math.random()*18,sp:.02+Math.random()*.1,ph:Math.random()*6.28,yy:(Math.random()-.5)*16});scene.add(m)}

const snowN=1500,snowP=new Float32Array(snowN*3),snowS=new Float32Array(snowN);
for(let i=0;i<snowN;i++){snowP[i*3]=(Math.random()-.5)*100;snowP[i*3+1]=(Math.random()-.5)*70;snowP[i*3+2]=(Math.random()-.5)*70;snowS[i]=.015+Math.random()*.05}
const snowG=new THREE.BufferGeometry();snowG.setAttribute('position',new THREE.BufferAttribute(snowP,3));
const snowM=new THREE.PointsMaterial({color:0xddeeff,size:.13,transparent:true,opacity:0,sizeAttenuation:true,depthWrite:false,blending:THREE.AdditiveBlending});
scene.add(new THREE.Points(snowG,snowM));

const mouse={x:0,y:0};addEventListener('mousemove',e=>{mouse.x=(e.clientX/VW-.5)*2;mouse.y=-(e.clientY/VH-.5)*2});
let t=0;const renderStart=performance.now();let dismissed=false;
function render(){if(dismissed)return;t+=.004;requestAnimationFrame(render);
camera.position.x+=(mouse.x*2-camera.position.x)*.01;camera.position.y+=(mouse.y*1.2-camera.position.y)*.01;camera.lookAt(0,0,0);
iceMesh.rotation.y=t*.15;iceMesh.rotation.x=Math.sin(t*.1)*.08;iceMesh.position.y=3+Math.sin(t*.22)*.3;iceMat.uniforms.uTime.value=t*10;
shards.forEach(s=>{const a=t*s.sp+s.ph;s.m.position.set(Math.cos(a)*s.r,s.yy+Math.sin(t*.12+s.ph)*1.5,Math.sin(a)*s.r);s.m.rotation.x=t*.2;s.m.rotation.z=t*.15});
// Snow deceleration: 5x speed at start → 0.15x after 6 seconds
const elapsed3d=(performance.now()-renderStart)/1000;
const snowSpeed=0.15+4.85*Math.max(0,1-elapsed3d/6);
const sp=snowG.attributes.position.array;for(let i=0;i<snowN;i++){sp[i*3+1]-=(snowS[i]+.008)*snowSpeed;sp[i*3]+=Math.sin(t+i*.1)*.0015*snowSpeed;if(sp[i*3+1]<-35){sp[i*3+1]=35;sp[i*3]=(Math.random()-.5)*100}}
snowG.attributes.position.needsUpdate=true;renderer.render(scene,camera)}
render();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

/* Foreground snow — starts fast, settles to gentle drift */
(function(){const c=document.getElementById('snow-fg'),x=c.getContext('2d');
let W,H;function rs(){W=c.width=innerWidth;H=c.height=innerHeight}rs();addEventListener('resize',rs);
const F=[];for(let i=0;i<50;i++)F.push({x:Math.random()*2e3,y:Math.random()*2e3,r:1.5+Math.random()*4,s:0.12+Math.random()*0.5,w:(Math.random()-.5)*.2,o:0.15+Math.random()*.35});
const fgStart=performance.now();

/* Audio */
let audioCtx=null,audioReady=false,crackQueued=false;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioReady=true;if(crackQueued)playIceCrack()}
function playIceCrack(){if(!audioReady){crackQueued=true;return}
  const sr=audioCtx.sampleRate;const now=audioCtx.currentTime;
  // Master compressor to prevent clipping but keep punch
  const comp=audioCtx.createDynamicsCompressor();
  comp.threshold.value=-12;comp.ratio.value=4;comp.attack.value=0.002;comp.release.value=0.15;
  comp.connect(audioCtx.destination);

  // LAYER 0: Pre-crack stress groan — ice under tension (starts 200ms before crack)
  const t0=audioCtx.createBuffer(1,sr*0.4,sr);const d0=t0.getChannelData(0);
  for(let i=0;i<d0.length;i++){const t=i/sr;
    const groan=Math.sin(t*55*6.28)*0.3+Math.sin(t*73*6.28)*0.15+Math.sin(t*41*6.28)*0.1;
    d0[i]=groan*Math.sin(t/0.4*Math.PI)*0.6+(Math.random()*2-1)*0.02}
  const s0=audioCtx.createBufferSource();s0.buffer=t0;
  const lp0=audioCtx.createBiquadFilter();lp0.type='lowpass';lp0.frequency.value=200;
  const g0=audioCtx.createGain();g0.gain.value=0.2;
  s0.connect(lp0);lp0.connect(g0);g0.connect(comp);s0.start(now);

  // LAYER 1: MAIN CRACK — sharp transient (the snap)
  const t1=audioCtx.createBuffer(1,sr*0.1,sr);const d1=t1.getChannelData(0);
  for(let i=0;i<d1.length;i++){const t=i/sr;
    d1[i]=(Math.random()*2-1)*Math.exp(-t*60)*(t<0.004?t*250:1)*1.2}
  const s1=audioCtx.createBufferSource();s1.buffer=t1;
  const hp1=audioCtx.createBiquadFilter();hp1.type='highpass';hp1.frequency.value=3000;
  const g1=audioCtx.createGain();g1.gain.value=0.3;
  s1.connect(hp1);hp1.connect(g1);g1.connect(comp);s1.start(now+0.25);

  // LAYER 2: Fracture propagation — descending sweep with crunch
  const t2=audioCtx.createBuffer(1,sr*0.6,sr);const d2=t2.getChannelData(0);
  for(let i=0;i<d2.length;i++){const t=i/sr;
    const sweep=Math.sin(t*1200*Math.exp(-t*5))*0.4;
    const crunch=(Math.random()*2-1)*Math.exp(-t*4)*0.6;
    d2[i]=(sweep+crunch)*Math.exp(-t*3)*(t<0.01?t*100:1)}
  const s2=audioCtx.createBufferSource();s2.buffer=t2;
  const bp2=audioCtx.createBiquadFilter();bp2.type='bandpass';bp2.frequency.value=2500;bp2.Q.value=0.6;
  const g2=audioCtx.createGain();g2.gain.value=0.22;
  s2.connect(bp2);bp2.connect(g2);g2.connect(comp);s2.start(now+0.25);

  // LAYER 3: Glass harmonics — crystalline ringing
  const t3=audioCtx.createBuffer(1,sr*1.2,sr);const d3=t3.getChannelData(0);
  for(let i=0;i<d3.length;i++){const t=i/sr;
    d3[i]=(Math.sin(t*2200*6.28)*0.2+Math.sin(t*3400*6.28)*0.12+Math.sin(t*4800*6.28)*0.06
      +Math.sin(t*6500*6.28)*0.03)*Math.exp(-t*2.5)*(1+Math.random()*0.15)}
  const s3=audioCtx.createBufferSource();s3.buffer=t3;
  const g3=audioCtx.createGain();g3.gain.value=0.1;
  s3.connect(g3);g3.connect(comp);s3.start(now+0.26);

  // LAYER 4: Bass impact — the mass of ice absorbing the break
  const t4=audioCtx.createBuffer(1,sr*0.5,sr);const d4=t4.getChannelData(0);
  for(let i=0;i<d4.length;i++){const t=i/sr;
    d4[i]=(Math.sin(t*65*6.28)*0.5+Math.sin(t*110*6.28)*0.3+Math.sin(t*40*6.28)*0.2)
      *Math.exp(-t*6)+(Math.random()*2-1)*Math.exp(-t*10)*0.2}
  const s4=audioCtx.createBufferSource();s4.buffer=t4;
  const lp4=audioCtx.createBiquadFilter();lp4.type='lowpass';lp4.frequency.value=300;
  const g4=audioCtx.createGain();g4.gain.value=0.25;
  s4.connect(lp4);lp4.connect(g4);g4.connect(comp);s4.start(now+0.25);

  // LAYER 5: Secondary cracks — 2-3 aftershock snaps
  [0.12,0.28,0.5].forEach(function(delay){
    const len=0.06+Math.random()*0.04;
    const tb=audioCtx.createBuffer(1,sr*len,sr);const db=tb.getChannelData(0);
    for(let i=0;i<db.length;i++){const t=i/sr;
      db[i]=(Math.random()*2-1)*Math.exp(-t*50)*0.6*(t<0.003?t*333:1)}
    const sb=audioCtx.createBufferSource();sb.buffer=tb;
    const hpb=audioCtx.createBiquadFilter();hpb.type='highpass';hpb.frequency.value=2500+Math.random()*2000;
    const gb=audioCtx.createGain();gb.gain.value=0.08+Math.random()*0.06;
    sb.connect(hpb);hpb.connect(gb);gb.connect(comp);sb.start(now+0.25+delay);
  });

  // LAYER 6: Crinkle tail — ice fragments settling (sparse pops)
  const t6=audioCtx.createBuffer(1,sr*2,sr);const d6=t6.getChannelData(0);
  for(let i=0;i<d6.length;i++){const t=i/sr;
    const pop=Math.random()>(0.982+t*0.008)?1:0;
    d6[i]=pop*(Math.random()*2-1)*Math.exp(-(t-0.3)*1.5)*0.4*(t>0.2?1:0)}
  const s6=audioCtx.createBufferSource();s6.buffer=t6;
  const hp6=audioCtx.createBiquadFilter();hp6.type='highpass';hp6.frequency.value=5000;
  const g6=audioCtx.createGain();g6.gain.value=0.12;
  s6.connect(hp6);hp6.connect(g6);g6.connect(comp);s6.start(now+0.35);

  // LAYER 7: Reverb wash — simulated space
  const t7=audioCtx.createBuffer(1,sr*3,sr);const d7=t7.getChannelData(0);
  for(let i=0;i<d7.length;i++){const t=i/sr;
    d7[i]=(Math.random()*2-1)*Math.exp(-t*1.2)*0.06*(1+Math.sin(t*0.3)*0.4)}
  const s7=audioCtx.createBufferSource();s7.buffer=t7;
  const lp7=audioCtx.createBiquadFilter();lp7.type='lowpass';lp7.frequency.value=1800;
  const g7=audioCtx.createGain();g7.gain.value=0.06;
  s7.connect(lp7);lp7.connect(g7);g7.connect(comp);s7.start(now+0.3);

  crackQueued=false}

function playIceChime(){if(!audioCtx)return;
  const sr=audioCtx.sampleRate;const now=audioCtx.currentTime;
  const comp=audioCtx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.ratio.value=3;comp.attack.value=0.001;comp.release.value=0.2;
  comp.connect(audioCtx.destination);
  // Crystal tap — short transient
  const t0=audioCtx.createBuffer(1,sr*0.05,sr);const d0=t0.getChannelData(0);
  for(let i=0;i<d0.length;i++){const t=i/sr;d0[i]=(Math.random()*2-1)*Math.exp(-t*120)*0.4*(t<0.002?t*500:1)}
  const s0=audioCtx.createBufferSource();s0.buffer=t0;
  const hp0=audioCtx.createBiquadFilter();hp0.type='highpass';hp0.frequency.value=4000;
  const g0=audioCtx.createGain();g0.gain.value=0.15;
  s0.connect(hp0);hp0.connect(g0);g0.connect(comp);s0.start(now);
  // Crystalline ring — 3 harmonics, long decay
  [3200,5100,7400].forEach(function(freq,i){
    const tb=audioCtx.createBuffer(1,sr*1.8,sr);const db=tb.getChannelData(0);
    const dec=1.8+i*0.6;
    for(let j=0;j<db.length;j++){const t=j/sr;
      db[j]=Math.sin(t*freq*6.28)*Math.exp(-t*dec)*(1+Math.sin(t*0.8)*0.04)}
    const sb=audioCtx.createBufferSource();sb.buffer=tb;
    const gb=audioCtx.createGain();gb.gain.value=0.05-i*0.01;
    sb.connect(gb);gb.connect(comp);sb.start(now+0.003+i*0.006);
  });
  // Soft air breath — barely audible, just presence
  const t2=audioCtx.createBuffer(1,sr*0.8,sr);const d2=t2.getChannelData(0);
  for(let i=0;i<d2.length;i++){const t=i/sr;d2[i]=(Math.random()*2-1)*Math.exp(-t*3)*0.015}
  const s2=audioCtx.createBufferSource();s2.buffer=t2;
  const lp2=audioCtx.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=3000;
  const g2=audioCtx.createGain();g2.gain.value=0.04;
  s2.connect(lp2);lp2.connect(g2);g2.connect(comp);s2.start(now);
}


function playMeltSound(){if(!audioCtx)return;
  const sr=audioCtx.sampleRate;const now=audioCtx.currentTime;
  // Soft ice exhale — very low rumble fading out
  const t0=audioCtx.createBuffer(1,sr*4,sr);const d0=t0.getChannelData(0);
  for(let i=0;i<d0.length;i++){const t=i/sr;
    d0[i]=(Math.random()*2-1)*0.06*(1+Math.sin(t*0.18)*0.5+Math.sin(t*0.07)*0.3)*Math.exp(-t*0.5)}
  const s0=audioCtx.createBufferSource();s0.buffer=t0;
  const lp0=audioCtx.createBiquadFilter();lp0.type='lowpass';lp0.frequency.value=180;
  const g0=audioCtx.createGain();g0.gain.value=0.08;
  s0.connect(lp0);lp0.connect(g0);g0.connect(audioCtx.destination);s0.start(now);
  // Water drips — sparse, realistic timing
  [0.4,0.9,1.6,2.1,2.8,3.4,4.2,5.0,5.9,7.1].forEach(function(delay,i){
    const freq=180+Math.random()*120;
    const len=0.18+Math.random()*0.12;
    const tb=audioCtx.createBuffer(1,sr*len,sr);const db=tb.getChannelData(0);
    for(let j=0;j<db.length;j++){const t=j/sr;
      // Impact transient + resonant cavity tone
      const impact=(Math.random()*2-1)*Math.exp(-t*80)*0.4*(t<0.003?t*333:1);
      const tone=Math.sin(t*freq*6.28)*Math.exp(-t*18)*0.25;
      const tail=Math.sin(t*(freq*0.6)*6.28)*Math.exp(-t*8)*0.12;
      db[j]=impact+tone+tail}
    const sb=audioCtx.createBufferSource();sb.buffer=tb;
    const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=freq*1.2;bp.Q.value=2;
    const gb=audioCtx.createGain();gb.gain.value=(0.12-i*0.008)*Math.random()*0.4+0.08;

  });

  const t1=audioCtx.createBuffer(1,sr*0.3,sr);const d1=t1.getChannelData(0);
  for(let i=0;i<d1.length;i++){const t=i/sr;
    d1[i]=(Math.random()*2-1)*Math.exp(-t*12)*0.25*(t<0.01?t*100:1)}
  const s1=audioCtx.createBufferSource();s1.buffer=t1;
  const hp1=audioCtx.createBiquadFilter();hp1.type='bandpass';hp1.frequency.value=800;hp1.Q.value=0.8;
  const g1=audioCtx.createGain();g1.gain.value=0.12;
  s1.connect(hp1);hp1.connect(g1);g1.connect(audioCtx.destination);s1.start(now+0.2);
  // Hiss of steam — ice meeting warmth
  const t2=audioCtx.createBuffer(1,sr*3,sr);const d2=t2.getChannelData(0);
  for(let i=0;i<d2.length;i++){const t=i/sr;
    d2[i]=(Math.random()*2-1)*Math.exp(-t*0.8)*0.025*(1+Math.sin(t*0.4)*0.3)}
  const s2=audioCtx.createBufferSource();s2.buffer=t2;

  const g2=audioCtx.createGain();g2.gain.value=0.06;
  s2.connect(bp2);bp2.connect(g2);g2.connect(audioCtx.destination);s2.start(now+0.3);
}

function startWind(){if(!audioCtx)return;
  // Base wind — low rumble
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*6,audioCtx.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/audioCtx.sampleRate;
    d[i]=(Math.random()*2-1)*0.04*(1+Math.sin(t*0.2)*0.6+Math.sin(t*0.07)*0.3)}
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;
  const gain=audioCtx.createGain();gain.gain.value=0.07;
  src.connect(lp);lp.connect(gain);gain.connect(audioCtx.destination);src.start();
  // High whistle layer — wind through cracks
  const buf2=audioCtx.createBuffer(1,audioCtx.sampleRate*4,audioCtx.sampleRate);const d2=buf2.getChannelData(0);
  for(let i=0;i<d2.length;i++){const t=i/audioCtx.sampleRate;
    d2[i]=(Math.random()*2-1)*0.01*(Math.sin(t*0.15)+1)*0.5}
  const src2=audioCtx.createBufferSource();src2.buffer=buf2;src2.loop=true;
  const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3500;bp.Q.value=8;
  const g2=audioCtx.createGain();g2.gain.value=0.015;
  src2.connect(bp);bp.connect(g2);g2.connect(audioCtx.destination);src2.start();
  // Occasional ice creaks
  function scheduleCreak(){
    const delay=3+Math.random()*8;
    setTimeout(function(){
      if(!audioCtx)return;
      const cb=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);const cd=cb.getChannelData(0);
      for(let i=0;i<cd.length;i++){const t=i/audioCtx.sampleRate;
        cd[i]=Math.sin(t*(40+Math.random()*30)*6.28)*Math.exp(-t*6)*0.03*(1+Math.random()*0.5)}
      const cs=audioCtx.createBufferSource();cs.buffer=cb;
      const cg=audioCtx.createGain();cg.gain.value=0.04+Math.random()*0.03;
      cs.connect(cg);cg.connect(audioCtx.destination);cs.start();
      scheduleCreak();
    },delay*1000);
  }
  scheduleCreak()}

document.getElementById('dismiss-btn').onclick=function(){
  const mc=document.getElementById('melt-canvas');
  mc.width=VW;mc.height=VH;mc.style.opacity='1';
  const mx=mc.getContext('2d');
  const startTime=performance.now();

  // PHASE 1: SHATTER CRACKS across viewport (instant)
  function shatterCrack(cx,cy,a,l,d){
    if(d>6||l<4)return;
    const ex=cx+Math.cos(a)*l,ey=cy+Math.sin(a)*l;
    mx.beginPath();mx.moveTo(cx,cy);mx.lineTo(ex,ey);
    mx.strokeStyle='rgba(220,245,255,'+(0.5-d*0.06)+')';
    mx.lineWidth=Math.max(0.5,2.5-d*0.3);mx.stroke();
    mx.beginPath();mx.moveTo(cx,cy);mx.lineTo(ex,ey);
    mx.strokeStyle='rgba(160,225,245,'+(0.12-d*0.015)+')';
    mx.lineWidth=5-d*0.6;mx.stroke();
    shatterCrack(ex,ey,a+(Math.random()-0.5)*0.9,l*(0.6+Math.random()*0.15),d+1);
    if(Math.random()>0.35)shatterCrack(ex,ey,a+0.7+Math.random()*0.5,l*0.45,d+1);
    if(Math.random()>0.45)shatterCrack(ex,ey,a-0.7-Math.random()*0.5,l*0.4,d+1);
  }
  var impacts=[[VW*0.3,VH*0.25],[VW*0.7,VH*0.4],[VW*0.5,VH*0.6],[VW*0.2,VH*0.7],[VW*0.8,VH*0.3]];
  impacts.forEach(function(pt){
    for(var j=0;j<5;j++){shatterCrack(pt[0],pt[1],Math.random()*Math.PI*2,40+Math.random()*60,0)}
  });
  // Save the crack frame as an image to persist under drops
  var crackImg=new Image();
  crackImg.src=mc.toDataURL();

  // Crack sound
  var s2=document.getElementById('sfx-dismiss');if(s2){s2.currentTime=0;s2.play().catch(function(){});}

  // PHASE 2: CONDENSATION DROPS — visible immediately
  var drops=[];
  // Small beads — appear fast
  for(var i=0;i<150;i++){
    drops.push({x:Math.random()*VW,y:Math.random()*VH,r:0,maxR:1.5+Math.random()*3.5,
      growRate:0.04+Math.random()*0.06,formDelay:0.1+Math.random()*1.2,
      slideDelay:1.5+Math.random()*3,slides:Math.random()>0.4,
      vy:0,maxVy:0.15+Math.random()*0.5,trail:[],opacity:0,alive:true});
  }
  // THICK anchor drops — appear first, very visible
  for(var i=0;i<40;i++){
    drops.push({x:30+Math.random()*(VW-60),y:30+Math.random()*(VH*0.65),
      r:0,maxR:6+Math.random()*8,growRate:0.08+Math.random()*0.06,
      formDelay:0.05+Math.random()*0.8,slideDelay:1+Math.random()*2,slides:true,
      vy:0,maxVy:0.3+Math.random()*0.8,trail:[],opacity:0,alive:true});
  }

  // GSAP — kill all layers except melt canvas
  dismissed=true; // Stop Three.js and foreground snow render loops
  var worldEl=document.getElementById('world');
  if(worldEl)worldEl.style.display='none'; // Immediately hide the ball/crystal

  var tl2=gsap.timeline();
  tl2.to('#content',{opacity:0,duration:2,ease:'power2.in'},0.3);
  tl2.to('#snow-fg',{opacity:0,duration:1.5},0);
  tl2.to('#edge-frost',{opacity:0,duration:2},0.3);
  tl2.to('#frost-patches',{opacity:0,duration:2},0.3);
  tl2.to('#res-cracks',{opacity:0,duration:1.5},0.3);
  tl2.to('#warm-glow',{opacity:0,duration:1.5},0.3);
  tl2.to('#warm-edge',{opacity:0,duration:1.5},0.3);
  tl2.to('#ice-wall',{opacity:0,duration:3,ease:'power1.in'},1);
  tl2.to('#ice-tex-coarse',{opacity:0,duration:3},1);
  tl2.to('#ice-tex-fine',{opacity:0,duration:3},1);
  tl2.to('#frost-overlay',{opacity:0,duration:2},0);
  tl2.to('#crack-canvas',{opacity:0,duration:2},0);
  // Fade the melt canvas LAST — after drops have fallen
  tl2.to('#melt-canvas',{opacity:0,duration:2,ease:'power2.in'},8);

  function animate(){
    var elapsed=(performance.now()-startTime)/1000;
    if(elapsed>10)return;
    requestAnimationFrame(animate);
    mx.clearRect(0,0,VW,VH);

    // Redraw cracks (fading)
    var crackFade=Math.max(0,1-elapsed/6);
    if(crackFade>0.01 && crackImg.complete){
      mx.globalAlpha=crackFade;
      mx.drawImage(crackImg,0,0);
      mx.globalAlpha=1;
    }

    // Draw condensation
    for(var di=0;di<drops.length;di++){
      var d=drops[di];
      if(!d.alive||elapsed<d.formDelay)continue;
      if(d.r<d.maxR){d.r=Math.min(d.r+d.growRate,d.maxR);d.opacity=Math.min(0.75,(d.r/d.maxR)*0.75)}
      if(d.slides&&elapsed>d.formDelay+d.slideDelay){
        d.vy=Math.min(d.vy+0.005,d.maxVy);
        if(Math.random()>0.96)d.vy*=0.2;
        d.y+=d.vy;
        d.x+=Math.sin(d.y*0.04)*(0.04+d.r*0.015);
        if(d.vy>0.02){d.trail.push({x:d.x,y:d.y});if(d.trail.length>100)d.trail.shift()}
        d.r=Math.max(d.r*0.9995,d.maxR*0.3);
        if(d.y>VH+15){d.alive=false;continue}
      }
      // Wet trail — thicker, more visible
      if(d.trail.length>1){
        mx.beginPath();mx.moveTo(d.trail[0].x,d.trail[0].y);
        for(var ti=1;ti<d.trail.length;ti++)mx.lineTo(d.trail[ti].x,d.trail[ti].y);
        mx.strokeStyle='rgba(170,220,242,'+d.opacity*0.2+')';
        mx.lineWidth=Math.max(1.5,d.r*0.5);mx.lineCap='round';mx.lineJoin='round';mx.stroke();
      }
      // Bead — rounder, brighter
      var sq=d.vy>0.1?0.85:1;
      mx.beginPath();mx.ellipse(d.x,d.y,d.r*(1/sq),d.r*sq,0,0,Math.PI*2);
      mx.fillStyle='rgba(170,220,242,'+d.opacity+')';mx.fill();
      // Rim
      if(d.r>2){mx.beginPath();mx.ellipse(d.x,d.y,d.r*(1/sq),d.r*sq,0,0,Math.PI*2);
        mx.strokeStyle='rgba(210,245,255,'+d.opacity*0.3+')';mx.lineWidth=0.8;mx.stroke()}
      // Highlight dome
      if(d.r>1.5){mx.beginPath();mx.ellipse(d.x-d.r*0.2,d.y-d.r*0.22,d.r*0.32,d.r*0.24,0,0,Math.PI*2);
        mx.fillStyle='rgba(240,252,255,'+d.opacity*0.55+')';mx.fill()}
    }
  }
  animate();
};

document.getElementById('voice-btn').onclick=function(){
  initAudio();
  if(!voicePlaying)playIceChime();
  var bs=document.querySelectorAll('.wb');

  // If already playing, stop
  if(voicePlaying){
    if(voiceAudio){voiceAudio.pause();voiceAudio.currentTime=0;voiceAudio=null}
    speechSynthesis.cancel();
    voicePlaying=false;
    bs.forEach(function(b){b.style.height='4px';b.style.opacity='.3';b.style.animation='none'});
    return;
  }

  // Start waveform animation
  voicePlaying=true;
  bs.forEach(function(b,i){
    b.style.height='14px';b.style.opacity='.6';
    b.style.animation='wA '+(0.3+i*0.08)+'s ease-in-out '+(i*0.06)+'s infinite alternate';
  });

  function stopAnim(){
    voicePlaying=false;
    bs.forEach(function(b){b.style.height='4px';b.style.opacity='.3';b.style.animation='none'});
  }

  // CHECK 1: Embedded Cortana audio (base64 WAV injected by thaw CLI)
  var cortanaEl=document.getElementById('cortana-audio');
  if(cortanaEl&&cortanaEl.textContent.trim().length>100){
    var audioData=cortanaEl.textContent.trim();
    var mime='audio/wav';
    if(audioData.substring(0,3)==='SUQ'||audioData.charAt(0)==='/') mime='audio/mpeg';
    voiceAudio=new Audio('data:'+mime+';base64,'+audioData);
    voiceAudio.onended=stopAnim;
    voiceAudio.onerror=function(){voiceAudio=null;speakWithBrowser()};
    voiceAudio.play();
    return;
  }

  // CHECK 2: Audio file path (for local file:// usage)
  var audioPath=document.body.getAttribute('data-voice-audio');
  if(audioPath){
    voiceAudio=new Audio(audioPath);
    voiceAudio.onended=stopAnim;
    voiceAudio.onerror=function(){voiceAudio=null;speakWithBrowser()};
    voiceAudio.play();
    return;
  }

  // FALLBACK: Browser speech synthesis
  speakWithBrowser();

  function speakWithBrowser(){
    speechSynthesis.cancel();

    // Extract structured data from DOM — then WRITE a briefing, don't read labels
    var hour=new Date().getHours();
    var greeting=hour<12?'Good morning.':hour<17?'Good afternoon.':'Good evening.';

    // Get headline stats
    var stats={};
    document.querySelectorAll('.stat').forEach(function(s){
      var lbl=s.querySelector('.stat-lbl');var val=s.querySelector('.stat-val');
      if(lbl&&val)stats[lbl.textContent.trim().toLowerCase()]=val.textContent.trim();
    });
    var deepWork=stats['deep work']||'';
    var sessions=stats['sessions']||'';

    // Parse projects into structured objects
    var blocked=[],active=[],clean=[];
    document.querySelectorAll('.proj').forEach(function(p){
      var obj={};
      var nameEl=p.querySelector('.proj-name');
      obj.name=nameEl?nameEl.textContent.trim():'';
      var timeEl=p.querySelector('.proj-time');
      obj.time=timeEl?timeEl.textContent.trim():'';
      var descEl=p.querySelector('.lo-txt');
      obj.desc=descEl?descEl.textContent.trim().replace(/\s+/g,' '):'';
      var prioEl=p.querySelector('.priority');
      obj.priority=prioEl?prioEl.textContent.trim():'';
      // Detect status from CSS class
      obj.status='paused';
      if(p.classList.contains('blocked'))obj.status='blocked';
      else if(p.classList.contains('up'))obj.status='active';
      // Get processes
      obj.running=[];obj.stopped=[];
      p.querySelectorAll('.proc').forEach(function(pr){
        var dot=pr.querySelector('.proc-dot');var nm=pr.querySelector('.proc-name');
        if(dot&&nm){
          if(dot.classList.contains('on'))obj.running.push(nm.textContent.trim());
          else obj.stopped.push(nm.textContent.trim());
        }
      });
      // Get resume commands
      obj.cmds=[];
      p.querySelectorAll('.cmd .c').forEach(function(c){obj.cmds.push(c.textContent.trim())});

      if(obj.status==='blocked')blocked.push(obj);
      else if(obj.status==='active')active.push(obj);
      else clean.push(obj);
    });

    // BUILD THE BRIEFING — like a chief of staff, not a screen reader
    var parts=[greeting];

    // Headline
    var sessNum=parseInt(sessions)||0;
    if(sessNum<=2)parts.push('Light day. '+deepWork+' of work across '+sessions+' sessions.');
    else if(sessNum>=8)parts.push('Heavy day. '+deepWork+' of deep work across '+sessions+' sessions.');
    else parts.push('You put in '+deepWork+' across '+sessions+' sessions.');

    // BLOCKED — lead with these, they're the news
    if(blocked.length>0){
      parts.push(blocked.length===1?'One thing needs attention.':blocked.length+' things need attention.');
      blocked.forEach(function(p){
        parts.push(p.name+' is blocked.');
        if(p.desc)parts.push(p.desc);
        if(p.cmds.length>0)parts.push('Pick up with: '+p.cmds[0]+'.');
      });
    }

    // ACTIVE — brief, focus on state
    active.forEach(function(p){
      var line=p.name;
      if(p.time)line+=', '+p.time;
      parts.push(line+'.');
      if(p.desc)parts.push(p.desc);
      if(p.running.length>0){
        if(p.running.length===1)parts.push(p.running[0]+' is still running.');
        else parts.push(p.running.slice(0,-1).join(', ')+' and '+p.running[p.running.length-1]+' are still running.');
      }
    });

    // CLEAN — compress hard
    if(clean.length===1)parts.push(clean[0].name+' is clean. Nothing to do there.');
    else if(clean.length>1)parts.push(clean.map(function(p){return p.name}).join(' and ')+' are clean.');

    // Closing — what to do first
    if(blocked.length>0)parts.push('Start with '+blocked[0].name+'.');
    else if(active.length>0)parts.push('Pick up where you left off on '+active[0].name+'.');

    var recap=parts.join(' ');
    if(!recap||recap.length<10)recap='No project data available.';

    // Short delay lets Chrome finish cancel() before new speak()
    setTimeout(function(){
      var utter=new SpeechSynthesisUtterance(recap);
      utter.rate=0.92;utter.pitch=0.85;

      // Pick best available voice from preloaded list
      var voices=cachedVoices.length>0?cachedVoices:speechSynthesis.getVoices();
      var preferred=['Samantha','Karen','Moira','Tessa','Fiona','Google UK English Female','Microsoft Zira','Daniel'];
      for(var v=0;v<voices.length;v++){for(var p=0;p<preferred.length;p++){
        if(voices[v].name.indexOf(preferred[p])!==-1){utter.voice=voices[v];break}}
        if(utter.voice)break}

      utter.onend=stopAnim;
      utter.onerror=function(e){console.error('TTS error:',e);stopAnim()};

      // Chrome workaround: long utterances get cut off at ~15s. Split into chunks.
      if(recap.length>200){
        var sentences=recap.match(/[^.!?]+[.!?]+/g)||[recap];
        var chunks=[];var current='';
        for(var si=0;si<sentences.length;si++){
          if((current+sentences[si]).length>180){
            if(current)chunks.push(current);
            current=sentences[si];
          }else{current+=sentences[si]}
        }
        if(current)chunks.push(current);

        var ci=0;
        function speakNext(){
          if(ci>=chunks.length||!voicePlaying){stopAnim();return}
          var u=new SpeechSynthesisUtterance(chunks[ci]);
          u.rate=0.92;u.pitch=0.85;
          if(utter.voice)u.voice=utter.voice;
          u.onend=function(){ci++;speakNext()};
          u.onerror=function(){ci++;speakNext()};
          speechSynthesis.speak(u);
        }
        speakNext();
      }else{
        speechSynthesis.speak(utter);
      }
    },50);
  }
};

document.addEventListener('click',function(e){
  if(settingsPanel.classList.contains('open')&&!settingsPanel.contains(e.target)&&e.target.id!=='settings-btn'){
    settingsPanel.classList.remove('open');
  }
});

// Load saved settings
function loadSettings(){
  try{
    var s=localStorage.getItem('thaw-settings');
    return s?JSON.parse(s):{autovoice:false,sfx:true,snow:true,wind:true};
  }catch(e){return{autovoice:false,sfx:true,snow:true,wind:true}}
}
function saveSettings(s){try{localStorage.setItem('thaw-settings',JSON.stringify(s))}catch(e){}}
var thawSettings=loadSettings();

// Apply saved to checkboxes
document.getElementById('set-autovoice').checked=thawSettings.autovoice;
document.getElementById('set-sfx').checked=thawSettings.sfx!==false;
document.getElementById('set-snow').checked=thawSettings.snow!==false;
document.getElementById('set-wind').checked=thawSettings.wind!==false;

// Setting change handlers
document.getElementById('set-autovoice').onchange=function(){
  thawSettings.autovoice=this.checked;saveSettings(thawSettings);
};
document.getElementById('set-sfx').onchange=function(){
  thawSettings.sfx=this.checked;saveSettings(thawSettings);
};
document.getElementById('set-snow').onchange=function(){
  thawSettings.snow=this.checked;saveSettings(thawSettings);
  // Toggle foreground snow layer
  var fg=document.getElementById('fg');
  if(fg)fg.style.display=this.checked?'block':'none';
};
document.getElementById('set-wind').onchange=function(){
  thawSettings.wind=this.checked;saveSettings(thawSettings);
  // Stop/start ambient audio
  if(!this.checked&&typeof ambientCtx!=='undefined'&&ambientCtx){try{ambientCtx.close()}catch(e){}}
};

// === AUTO-VOICE ON OPEN ===
// Fires after intro animation completes (~4s) if enabled
if(thawSettings.autovoice){
  setTimeout(function(){
    // Only auto-play if user hasn't interacted yet
    if(!voicePlaying){
      var vb=document.getElementById('voice-btn');
      if(vb)vb.click();
    }
  },4200);
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown',function(e){
  // Don't capture when typing in inputs
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  
  switch(e.code){
    case 'Space':
      e.preventDefault();
      document.getElementById('voice-btn').click();
      break;
    case 'Escape':
      if(settingsPanel.classList.contains('open')){
        settingsPanel.classList.remove('open');
      }else{
        document.getElementById('dismiss-btn').click();
      }
      break;
    case 'KeyR':
      if(!e.metaKey&&!e.ctrlKey){
        document.getElementById('restore-btn').click();
      }
      break;
    case 'KeyC':
      if(!e.metaKey&&!e.ctrlKey){
        // Copy first command to clipboard
        var firstCmd=document.querySelector('.cmd .c');
        if(firstCmd)copyCmd(firstCmd);
      }
      break;
    case 'KeyS':
      if(!e.metaKey&&!e.ctrlKey){
        settingsPanel.classList.toggle('open');
      }
      break;
  }
});

// === CLICK-TO-COPY COMMANDS ===
function copyCmd(el){
  var txt=el.textContent.trim();
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){
      el.classList.add('copied');
      setTimeout(function(){el.classList.remove('copied')},1200);
    });
  }else{
    // Fallback
    var ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');el.classList.add('copied');
      setTimeout(function(){el.classList.remove('copied')},1200);
    }catch(e){}
    document.body.removeChild(ta);
  }
}
document.querySelectorAll('.cmd .c').forEach(function(c){
  c.title='Click to copy';
  c.onclick=function(e){e.stopPropagation();copyCmd(this)};
});

// === RELATIVE TIMESTAMPS ===
document.querySelectorAll('.proj-time').forEach(function(el){
  var raw=el.textContent.trim();
  // Try to parse ISO or "2h 14m" style — add "ago" if not already present
  if(raw&&!raw.includes('ago')&&/^\d/.test(raw)){
    // Check if it's already relative (like "2h 14m")
    if(/\d+[hm]/.test(raw)){
      el.textContent=raw+' ago';
    }
  }
});
</script>
